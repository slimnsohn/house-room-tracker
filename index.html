<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0f0f14">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Maple House Tracker</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0f14;
      --surface: #1a1a24;
      --surface-2: #22222e;
      --border: #2a2a3a;
      --border-light: #3a3a4a;
      --text: #e8e8ed;
      --text-secondary: #8888a0;
      --text-muted: #555568;
      --accent: #4a8cff;
      --accent-dim: rgba(74,140,255,0.15);
      --green: #34c759;
      --green-dim: rgba(52,199,89,0.15);
      --red: #ff453a;
      --red-dim: rgba(255,69,58,0.15);
      --orange: #ff9f0a;
      --orange-dim: rgba(255,159,10,0.15);
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
      --safe-left: env(safe-area-inset-left, 0px);
      --safe-right: env(safe-area-inset-right, 0px);
    }

    html, body, #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      padding-top: var(--safe-top);
      padding-left: var(--safe-left);
      padding-right: var(--safe-right);
    }

    /* Tab Bar */
    .tab-bar {
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--surface);
      border-top: 1px solid var(--border);
      padding: 8px 0;
      padding-bottom: calc(8px + var(--safe-bottom));
      flex-shrink: 0;
    }

    .tab-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      padding: 6px 20px;
      min-height: 44px;
      min-width: 44px;
      cursor: pointer;
      transition: color 0.2s;
    }

    .tab-btn.active { color: var(--accent); }
    .tab-btn .tab-icon { font-size: 22px; }
    .tab-btn .tab-label { margin-top: 1px; }

    /* Header */
    .app-header {
      padding: 16px 20px 8px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-header-left {}

    .app-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 28px;
      font-weight: 700;
      color: var(--text);
    }

    .app-header .subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 2px;
    }

    .gear-btn {
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      padding: 8px;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
    }

    .room-card-items-preview {
      border-top: 1px solid var(--border);
      padding: 10px 20px 14px;
      max-height: 140px;
      overflow: hidden;
    }

    .room-card-items-preview .preview-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .preview-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 3px 0;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .preview-item .preview-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .preview-item .preview-text {
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .preview-more {
      font-size: 12px;
      color: var(--text-muted);
      padding-top: 4px;
    }

    /* Carousel */
    .carousel-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
      touch-action: pan-y;
      padding: 0 20px;
    }

    .carousel-card-wrapper {
      width: 100%;
      max-width: 360px;
      cursor: grab;
      will-change: transform;
      transition: none;
    }

    /* transition handled inline via Property Scout animation pattern */

    .room-card {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .room-card-hero {
      width: 100%;
      height: 140px;
      object-fit: cover;
      display: block;
      background: var(--surface-2);
    }

    .room-card-hero-placeholder {
      width: 100%;
      height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--surface-2), var(--border));
      font-family: 'Playfair Display', serif;
      font-size: 64px;
      color: var(--text-muted);
    }

    .room-card-body {
      padding: 20px;
    }

    .room-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .room-card-name {
      font-family: 'Playfair Display', serif;
      font-size: 24px;
      font-weight: 700;
    }

    .floor-pill {
      background: var(--accent-dim);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 99px;
    }

    .progress-bar-track {
      width: 100%;
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      transition: width 0.4s ease;
    }

    .room-card-stats {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      color: var(--text-secondary);
    }

    .room-card-stats .stat-value {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
      color: var(--text);
    }

    .room-card-stats .must-do-count {
      color: var(--red);
    }

    /* Dots */
    .dots {
      display: flex;
      gap: 8px;
      justify-content: center;
      padding: 16px 0;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.2s, transform 0.2s;
    }

    .dot.active {
      background: var(--accent);
      transform: scale(1.3);
    }

    /* Nav Arrows */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s;
      min-height: 44px;
      min-width: 44px;
    }

    .nav-arrow:hover { background: rgba(255,255,255,0.14); }
    .nav-arrow.left { left: 4px; }
    .nav-arrow.right { right: 4px; }

    /* Room Detail */
    .room-detail {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .room-detail-header {
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 22px;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .room-detail-title {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 700;
      flex: 1;
    }

    .room-detail-meta {
      font-size: 12px;
      color: var(--text-secondary);
      text-align: right;
    }

    /* Filter Bar */
    .filter-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      overflow-x: auto;
      flex-shrink: 0;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }

    .filter-bar::-webkit-scrollbar { display: none; }

    .filter-pill {
      flex-shrink: 0;
      padding: 6px 14px;
      border-radius: 99px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      min-height: 34px;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .filter-pill.active {
      background: var(--accent-dim);
      color: var(--accent);
      border-color: var(--accent);
    }

    /* Item List */
    .item-list {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 16px;
      -webkit-overflow-scrolling: touch;
    }

    .item-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .item-row:active { background: var(--surface-2); }

    .checkbox {
      width: 26px;
      height: 26px;
      min-width: 26px;
      border-radius: 50%;
      border: 2px solid var(--border-light);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 2px;
      min-height: 44px;
      min-width: 44px;
      background: transparent;
      /* visual circle is 26px, but tap area is 44px */
      position: relative;
    }

    .checkbox::before {
      content: '';
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2px solid var(--border-light);
      position: absolute;
      transition: all 0.2s;
    }

    .checkbox.checked::before {
      background: var(--green);
      border-color: var(--green);
    }

    .checkbox.checked::after {
      content: '✓';
      position: absolute;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      z-index: 1;
    }

    .item-content {
      flex: 1;
      min-width: 0;
    }

    .item-desc {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.3;
      word-wrap: break-word;
    }

    .item-desc.completed {
      text-decoration: line-through;
      color: var(--text-muted);
    }

    .item-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 6px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      padding: 2px 8px;
      border-radius: 99px;
      font-size: 11px;
      font-weight: 500;
    }

    .chip.category {
      background: var(--surface-2);
      color: var(--text-secondary);
      border: 1px solid var(--border);
    }

    .chip.priority-must {
      background: var(--red-dim);
      color: var(--red);
    }

    .chip.priority-should {
      background: var(--orange-dim);
      color: var(--orange);
    }

    .chip.priority-nice {
      background: var(--green-dim);
      color: var(--green);
    }

    .item-cost {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .item-delete {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 16px;
      cursor: pointer;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s;
      flex-shrink: 0;
    }

    .item-delete:hover { color: var(--red); }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .empty-state .empty-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    /* Add Item Bar */
    .add-item-bar {
      display: flex;
      gap: 8px;
      padding: 12px 16px;
      padding-bottom: calc(12px + var(--safe-bottom));
      background: var(--surface);
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      align-items: center;
    }

    .add-item-bar input,
    .add-item-bar select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 0 12px;
      min-height: 44px;
      outline: none;
      transition: border-color 0.2s;
    }

    .add-item-bar input:focus,
    .add-item-bar select:focus {
      border-color: var(--accent);
    }

    .add-item-bar input { flex: 1; min-width: 0; }
    .add-item-bar select { width: auto; max-width: 100px; }

    .add-btn {
      width: 44px;
      height: 44px;
      min-width: 44px;
      border-radius: 12px;
      background: var(--accent);
      border: none;
      color: #fff;
      font-size: 22px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
    }

    .add-btn:disabled { opacity: 0.4; cursor: default; }

    /* Modal */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      z-index: 100;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .modal-sheet {
      background: var(--surface);
      border-radius: 20px 20px 0 0;
      width: 100%;
      max-width: 500px;
      max-height: 85vh;
      overflow-y: auto;
      padding: 24px 20px;
      padding-bottom: calc(24px + var(--safe-bottom));
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .form-field {
      margin-bottom: 16px;
    }

    .form-field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .form-field input,
    .form-field select,
    .form-field textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 10px 14px;
      min-height: 44px;
      outline: none;
      transition: border-color 0.2s;
    }

    .form-field input:focus,
    .form-field select:focus,
    .form-field textarea:focus {
      border-color: var(--accent);
    }

    .form-field textarea {
      min-height: 80px;
      resize: vertical;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .modal-actions button {
      flex: 1;
      min-height: 48px;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: opacity 0.2s;
    }

    .btn-cancel {
      background: var(--border);
      color: var(--text);
    }

    .btn-save {
      background: var(--accent);
      color: #fff;
    }

    /* Summary */
    .summary-view {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
      -webkit-overflow-scrolling: touch;
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      margin: 24px 0 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
    }

    .stat-card .stat-label {
      font-size: 12px;
      color: var(--text-secondary);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.3px;
    }

    .stat-card .stat-value {
      font-family: 'DM Mono', monospace;
      font-size: 28px;
      font-weight: 500;
      margin-top: 6px;
      color: var(--text);
    }

    .stat-card .stat-value.red { color: var(--red); }
    .stat-card .stat-value.green { color: var(--green); }

    .shopping-list-category {
      margin-top: 16px;
    }

    .shopping-list-category-header {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .shopping-list-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 6px;
      font-size: 14px;
    }

    .shopping-list-item .room-tag {
      font-size: 11px;
      color: var(--text-muted);
      background: var(--surface-2);
      padding: 2px 8px;
      border-radius: 99px;
      flex-shrink: 0;
      margin-left: 8px;
    }

    .cost-summary {
      margin-top: 20px;
    }

    .cost-row {
      display: flex;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border);
      font-size: 15px;
    }

    .cost-row .cost-amount {
      font-family: 'DM Mono', monospace;
      font-weight: 500;
    }

    .export-btn {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      background: var(--accent);
      color: #fff;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 24px;
      transition: opacity 0.2s;
    }

    .export-btn:active { opacity: 0.8; }

    /* Settings */
    .settings-view {
      flex: 1;
      overflow-y: auto;
      padding: 0 16px 24px;
      -webkit-overflow-scrolling: touch;
    }

    .settings-group {
      margin-top: 24px;
    }

    .settings-group-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .settings-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .settings-row .settings-value {
      color: var(--text-secondary);
      font-size: 13px;
    }

    .danger-btn {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      background: var(--red-dim);
      color: var(--red);
      border: 1px solid rgba(255,69,58,0.3);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }

    .danger-btn:active { opacity: 0.8; }

    .refresh-btn {
      width: 100%;
      min-height: 48px;
      border-radius: 12px;
      background: var(--accent-dim);
      color: var(--accent);
      border: 1px solid rgba(74,140,255,0.3);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 12px;
      transition: opacity 0.2s;
    }

    .refresh-btn:active { opacity: 0.8; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: calc(80px + var(--safe-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface-2);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      z-index: 200;
      animation: toastIn 0.3s ease;
      white-space: nowrap;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    // ── RoomDetail ───────────────────────────────────────────────────────

          notes: ''
        };
        setLocalItems(function(list) { return list.concat([newItem]); });
        setNewDesc('');
        api.createItem(newItem).then(function(res) {
          if (res.item_id) {
            setLocalItems(function(list) {
              return list.map(function(i) { return i.id === newItem.id ? Object.assign({}, i, { id: res.item_id }) : i; });
            });
          }
          onItemsChanged(null, newItem); // null id = new
        }).catch(function(err) {
          setLocalItems(function(list) { return list.filter(function(i) { return i.id !== newItem.id; }); });
          showToast('Add failed: ' + err.message);
        });
      }

      function handleKeyDown(e) {
        if (e.key === 'Enter') handleAdd();
      }

      return h('div', { className: 'room-detail' },
        h('div', { className: 'room-detail-header' },
          h('button', { className: 'back-btn', onClick: onBack }, '\u2190'),
          h('div', { style: { flex: 1 } },
            h('div', { className: 'room-detail-title' }, room.name),
            h('div', { className: 'room-detail-meta' }, (room.floor || 'Main') + ' \u00B7 ' + completed + '/' + localItems.length + ' done')
          )
        ),
        h('div', { className: 'filter-bar' },
          h('button', { className: 'filter-pill' + (filter === 'all' ? ' active' : ''), onClick: function() { setFilter('all'); } }, 'All'),
          h('button', { className: 'filter-pill' + (filter === 'open' ? ' active' : ''), onClick: function() { setFilter('open'); } }, 'Open'),
          h('button', { className: 'filter-pill' + (filter === 'done' ? ' active' : ''), onClick: function() { setFilter('done'); } }, 'Done'),
          h('button', { className: 'filter-pill' + (filter === 'must' ? ' active' : ''), onClick: function() { setFilter('must'); } }, '\uD83D\uDD34 Must-Do'),
          catNames.map(function(c) {
            var cat = categories[c];
            return h('button', {
              key: c,
              className: 'filter-pill' + (filter === c ? ' active' : ''),
              onClick: function() { setFilter(c); }
            }, (cat.icon_emoji || '') + ' ' + c);
          })
        ),
        h('div', { className: 'item-list' },
          filtered.length === 0
            ? h('div', { className: 'empty-state' },
                h('div', { className: 'empty-icon' }, '\uD83D\uDCCB'),
                h('p', null, 'No items match this filter')
              )
            : filtered.map(function(item) {
                return h(ItemRow, {
                  key: item.id,
                  item: item,
                  categories: categories,
                  onToggle: handleToggle,
                  onEdit: function(i) { setEditing(i); },
                  onDelete: handleDelete
                });
              })
        ),
        h('div', { className: 'add-item-bar' },
          h('input', {
            placeholder: 'Add item...',
            value: newDesc,
            onChange: function(e) { setNewDesc(e.target.value); },
            onKeyDown: handleKeyDown
          }),
          h('select', { value: newCat, onChange: function(e) { setNewCat(e.target.value); } },
            h('option', { value: '' }, 'Cat.'),
            catNames.map(function(c) { return h('option', { key: c, value: c }, c); })
          ),
          h('select', { value: newPri, onChange: function(e) { setNewPri(e.target.value); } },
            h('option', { value: 'must' }, 'Must'),
            h('option', { value: 'should' }, 'Should'),
            h('option', { value: 'nice' }, 'Nice')
          ),
          h('button', { className: 'add-btn', onClick: handleAdd, disabled: !newDesc.trim() }, '+')
        ),
        editing && h(ItemEditModal, {
          item: editing,
          categories: categories,
          onSave: handleEditSave,
          onClose: function() { setEditing(null); }
        }),
        toast && h('div', { className: 'toast' }, toast)
      );
    }

    // ── SummaryView ──────────────────────────────────────────────────────
    function SummaryView(props) {
      var rooms = props.rooms, items = props.items, categories = props.categories;

      var totalItems = items.length;
      var openItems = items.filter(function(i) { return i.status !== 'completed'; });
      var mustDoOpen = items.filter(function(i) { return i.priority === 'must' && i.status !== 'completed'; });
      var estRemaining = openItems.reduce(function(s, i) { return s + (Number(i.cost_estimate) || 0); }, 0);
      var totalEst = items.reduce(function(s, i) { return s + (Number(i.cost_estimate) || 0); }, 0);
      var totalActual = items.reduce(function(s, i) { return s + (Number(i.cost_actual) || 0); }, 0);

      // Group open items by category
      var grouped = {};
      openItems.forEach(function(item) {
        var cat = item.category || 'Uncategorized';
        if (!grouped[cat]) grouped[cat] = [];
        grouped[cat].push(item);
      });

      var roomMap = {};
      rooms.forEach(function(r) { roomMap[r.id] = r.name; });

      function exportCsv() {
        var headers = ['Room', 'Category', 'Description', 'Status', 'Priority', 'Est. Cost', 'Actual Cost', 'Vendor', 'Notes'];
        var rows = items.map(function(item) {
          return [
            roomMap[item.room_id] || '',
            item.category || '',
            (item.description || '').replace(/"/g, '""'),
            item.status || '',
            item.priority || '',
            item.cost_estimate || '',
            item.cost_actual || '',
            (item.vendor || '').replace(/"/g, '""'),
            (item.notes || '').replace(/"/g, '""')
          ].map(function(v) { return '"' + v + '"'; }).join(',');
        });
        var csv = headers.join(',') + '\n' + rows.join('\n');
        var blob = new Blob([csv], { type: 'text/csv' });
        var url = URL.createObjectURL(blob);
        var a = document.createElement('a');
        var date = new Date().toISOString().slice(0, 10);
        a.href = url;
        a.download = 'maple-tracker-' + date + '.csv';
        a.click();
        URL.revokeObjectURL(url);
      }

      return h('div', { className: 'summary-view' },
        h('div', { className: 'section-title' }, 'Overview'),
        h('div', { className: 'stat-grid' },
          h('div', { className: 'stat-card' },
            h('div', { className: 'stat-label' }, 'Total Items'),
            h('div', { className: 'stat-value' }, totalItems)
          ),
          h('div', { className: 'stat-card' },
            h('div', { className: 'stat-label' }, 'Open'),
            h('div', { className: 'stat-value' }, openItems.length)
          ),
          h('div', { className: 'stat-card' },
            h('div', { className: 'stat-label' }, 'Must-Do'),
            h('div', { className: 'stat-value red' }, mustDoOpen.length)
          ),
          h('div', { className: 'stat-card' },
            h('div', { className: 'stat-label' }, 'Est. Remaining'),
            h('div', { className: 'stat-value' }, formatCost(estRemaining) || '$0')
          )
        ),
        h('div', { className: 'section-title' }, 'Shopping List'),
        Object.keys(grouped).length === 0
          ? h('div', { className: 'empty-state' }, h('p', null, 'All items completed!'))
          : Object.keys(grouped).map(function(cat) {
              var catObj = categories[cat] || {};
              return h('div', { key: cat, className: 'shopping-list-category' },
                h('div', { className: 'shopping-list-category-header' },
                  h('span', null, (catObj.icon_emoji || '') + ' ' + cat),
                  h('span', null, '(' + grouped[cat].length + ')')
                ),
                grouped[cat].map(function(item) {
                  return h('div', { key: item.id, className: 'shopping-list-item' },
                    h('span', null, item.description),
                    h('span', { className: 'room-tag' }, roomMap[item.room_id] || '')
                  );
                })
              );
            }),
        h('div', { className: 'cost-summary' },
          h('div', { className: 'section-title' }, 'Costs'),
          h('div', { className: 'cost-row' },
            h('span', null, 'Total Estimated'),
            h('span', { className: 'cost-amount' }, formatCost(totalEst) || '$0')
          ),
          h('div', { className: 'cost-row' },
            h('span', null, 'Spent So Far'),
            h('span', { className: 'cost-amount' }, formatCost(totalActual) || '$0')
          )
        ),
        h('button', { className: 'export-btn', onClick: exportCsv }, '\uD83D\uDCE5 Export CSV')
      );
    }

    // ── SettingsView ─────────────────────────────────────────────────────
    function SettingsView(props) {
      var lastSync = props.lastSync, onRefresh = props.onRefresh;

      function clearCache() {
        if (confirm('Clear all cached data? The app will reload and fetch fresh data.')) {
          localStorage.removeItem('maple-tracker-data');
          window.location.reload();
        }
      }

      return h('div', { className: 'settings-view' },
        h('div', { className: 'settings-group' },
          h('div', { className: 'settings-group-title' }, 'General'),
          h('div', { className: 'settings-row' },
            h('span', null, 'House'),
            h('span', { className: 'settings-value' }, 'Maple')
          ),
          h('div', { className: 'settings-row' },
            h('span', null, 'Last Synced'),
            h('span', { className: 'settings-value' }, lastSync ? new Date(lastSync).toLocaleString() : 'Never')
          )
        ),
        h('div', { className: 'settings-group' },
          h('div', { className: 'settings-group-title' }, 'Data'),
          h('button', { className: 'refresh-btn', onClick: onRefresh }, '\uD83D\uDD04 Refresh Data')
        ),
        h('div', { className: 'settings-group' },
          h('div', { className: 'settings-group-title' }, 'Danger Zone'),
          h('button', { className: 'danger-btn', onClick: clearCache }, '\uD83D\uDDD1 Clear Local Cache')
        )
      );
    }

    // ── App ──────────────────────────────────────────────────────────────
    // ── AllItemsView ─────────────────────────────────────────────────────
    function AllItemsView(props) {
      var rooms = props.rooms, items = props.items, categories = props.categories;
      var onBack = props.onBack, onItemsChanged = props.onItemsChanged;
      var _toast = useState(null), toast = _toast[0], setToast = _toast[1];

      function showToast(msg) {
        setToast(msg);
        setTimeout(function() { setToast(null); }, 2500);
      }

      function toggleItem(item) {
        var newStatus = item.status === 'completed' ? 'not_started' : 'completed';
        onItemsChanged(item.item_id || item.id, { status: newStatus });
        api.updateItem(item.item_id || item.id, { status: newStatus }).catch(function(err) {
          showToast('Failed: ' + err.message);
        });
      }

      // Build room map
      var roomMap = {};
      rooms.forEach(function(r) { roomMap[r.room_id || r.id] = r; });

      return h('div', { className: 'room-detail' },
        h('div', { className: 'room-detail-header' },
          h('button', { className: 'back-btn', onClick: onBack }, '\u2190'),
          h('span', { className: 'room-detail-title' }, 'All Items'),
          h('span', { style: { fontFamily: "'DM Mono', monospace", fontSize: '13px', color: 'var(--text-secondary)', marginLeft: 'auto' } },
            items.filter(function(i) { return i.status !== 'completed'; }).length + ' open'
          )
        ),
        h('div', { className: 'item-list', style: { padding: '16px' } },
          rooms.map(function(room) {
            var roomId = room.room_id || room.id;
            var roomItems = items.filter(function(i) { return (i.room_id || '') === roomId && i.status !== 'completed'; });
            if (roomItems.length === 0) return null;
            var colors = ROOM_COLORS[getRoomType(room.name)];
            return h('div', { key: roomId, style: { marginBottom: '20px' } },
              h('div', { style: {
                fontSize: '14px', fontWeight: '600', color: colors.accent,
                marginBottom: '8px', paddingBottom: '6px',
                borderBottom: '1px solid ' + colors.border,
                display: 'flex', alignItems: 'center', gap: '8px'
              } },
                h('span', null, room.name),
                h('span', { style: { fontSize: '12px', color: 'var(--text-muted)', fontWeight: '400' } }, roomItems.length + ' items')
              ),
              roomItems.map(function(item) {
                var cat = categories[item.category] || {};
                var priorityColors = { must: '#f85149', should: '#d29922', nice: '#3fb950' };
                return h('div', { key: item.item_id || item.id, style: {
                  display: 'flex', alignItems: 'flex-start', gap: '10px',
                  padding: '10px 12px', background: 'var(--surface)',
                  borderRadius: '10px', marginBottom: '6px'
                } },
                  h('button', {
                    className: 'checkbox',
                    onClick: function() { toggleItem(item); }
                  }),
                  h('div', { style: { flex: 1, minWidth: 0 } },
                    h('div', { style: { fontSize: '14px', color: 'var(--text)' } }, item.description),
                    item.notes && h('div', { style: { fontSize: '12px', color: 'var(--text-secondary)', marginTop: '3px' } }, item.notes),
                    h('div', { style: { display: 'flex', gap: '6px', marginTop: '5px', flexWrap: 'wrap' } },
                      item.category && h('span', { className: 'chip category' }, (cat.icon_emoji || '') + ' ' + item.category),
                      item.priority && h('span', { className: 'chip priority-' + item.priority }, item.priority),
                      item.cost_estimate && h('span', { style: { fontSize: '12px', fontFamily: "'DM Mono', monospace", color: 'var(--text-muted)' } }, formatCost(item.cost_estimate))
                    )
                  ),
                  h('span', { style: { width: '6px', height: '6px', borderRadius: '50%', background: priorityColors[item.priority] || '#555', flexShrink: 0, marginTop: '6px' } })
                );
              })
            );
          }),
          items.filter(function(i) { return i.status !== 'completed'; }).length === 0 &&
            h('div', { style: { textAlign: 'center', padding: '40px', color: 'var(--text-muted)' } },
              h('div', { style: { fontSize: '32px', marginBottom: '12px' } }, '\u2705'),
              'All items complete!'
            )
        ),
        toast && h('div', { className: 'toast' }, toast)
      );
    }

    function App() {
      // tab state removed — no bottom tab bar
      var _rooms = useState([]);
      var rooms = _rooms[0], setRooms = _rooms[1];
      var _items = useState([]);
      var items = _items[0], setItems = _items[1];
      var _categories = useState({});
      var categories = _categories[0], setCategories = _categories[1];
      var _selectedRoom = useState(null);
      var selectedRoom = _selectedRoom[0], setSelectedRoom = _selectedRoom[1];
      var _loading = useState(true);
      var loading = _loading[0], setLoading = _loading[1];
      var _error = useState(null);
      var error = _error[0], setError = _error[1];
      var _lastSync = useState(null);
      var lastSync = _lastSync[0], setLastSync = _lastSync[1];
      var _showSettings = useState(false);
      var showSettings = _showSettings[0], setShowSettings = _showSettings[1];
      var _showAll = useState(false);
      var showAll = _showAll[0], setShowAll = _showAll[1];

      var loadData = useCallback(function() {
        setLoading(true);
        setError(null);
        api.bootstrap().then(function(data) {
          var sortedRooms = (data.rooms || [])
            .filter(function(r) { return !r.archived; })
            .sort(function(a, b) { return (a.sort_order || 0) - (b.sort_order || 0); });
          var catLookup = {};
          (data.categories || []).forEach(function(c) {
            catLookup[c.name] = { icon_emoji: c.icon_emoji || '', default_items: c.default_items || '' };
          });
          setRooms(sortedRooms);
          setItems(data.items || []);
          setCategories(catLookup);
          setLastSync(Date.now());
          setLoading(false);
          // Cache
          try {
            localStorage.setItem('maple-tracker-data', JSON.stringify({
              rooms: sortedRooms,
              items: data.items || [],
              categories: catLookup,
              timestamp: Date.now()
            }));
          } catch(e) {}
        }).catch(function(err) {
          // Try cache
          try {
            var cached = JSON.parse(localStorage.getItem('maple-tracker-data'));
            if (cached && cached.rooms) {
              setRooms(cached.rooms);
              setItems(cached.items || []);
              setCategories(cached.categories || {});
              setLastSync(cached.timestamp);
              setLoading(false);
              return;
            }
          } catch(e) {}
          setError(err.message);
          setLoading(false);
        });
      }, []);

      useEffect(function() { loadData(); }, [loadData]);

      function handleItemsChanged(itemId, fieldsOrItem) {
        if (fieldsOrItem === null) {
          // Deleted
          setItems(function(list) { return list.filter(function(i) { return i.id !== itemId; }); });
        } else if (itemId === null) {
          // New item
          setItems(function(list) { return list.concat([fieldsOrItem]); });
        } else {
          // Updated
          setItems(function(list) {
            return list.map(function(i) { return i.id === itemId ? Object.assign({}, i, fieldsOrItem) : i; });
          });
        }
      }

      // Tab content
      var content;
      if (loading) {
        content = h('div', { className: 'carousel-container' },
          h('div', { className: 'skeleton skeleton-card' })
        );
      } else if (error) {
        content = h('div', { className: 'error-state' },
          h('div', { className: 'error-icon' }, '\u26A0\uFE0F'),
          h('div', { className: 'error-msg' }, error),
          h('button', { className: 'retry-btn', onClick: loadData }, 'Retry')
        );
      } else if (showAll) {
        content = h(AllItemsView, {
          rooms: rooms,
          items: items,
          categories: categories,
          onBack: function() { setShowAll(false); },
          onItemsChanged: handleItemsChanged
        });
      } else if (selectedRoom) {
        content = h(RoomDetail, {
          room: selectedRoom,
          items: items,
          categories: categories,
          onBack: function() { setSelectedRoom(null); },
          onItemsChanged: handleItemsChanged
        });
      } else {
        content = [
          h('div', { key: 'header', className: 'app-header' },
            h('div', { className: 'app-header-left' },
              h('h1', null, 'Maple'),
              h('div', { className: 'subtitle' }, rooms.length + ' rooms \u00B7 ' + items.filter(function(i) { return i.status !== 'completed'; }).length + ' open items')
            ),
            h('div', { key: 'actions', style: { display: 'flex', gap: '4px' } },
              h('button', { className: 'gear-btn', onClick: function() { setShowAll(true); }, title: 'All items' }, '\uD83D\uDCCB'),
              h('button', { className: 'gear-btn', onClick: function() { setShowSettings(true); }, title: 'Settings' }, '\u2699\uFE0F')
            )
          ),
          h(Carousel, {
            key: 'carousel',
            rooms: rooms,
            items: items,
            onSelectRoom: function(r) { setSelectedRoom(r); }
          })
        ];
      }

      return h('div', { className: 'app' },
        content,
        showSettings && h('div', { className: 'modal-overlay', onClick: function() { setShowSettings(false); } },
          h('div', { className: 'modal-sheet', onClick: function(e) { e.stopPropagation(); } },
            h('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '16px' } },
              h('h2', { style: { fontFamily: "'Playfair Display', serif", fontSize: '20px', margin: 0 } }, 'Settings'),
              h('button', { style: { background: 'none', border: 'none', color: 'var(--text-secondary)', fontSize: '20px', cursor: 'pointer', padding: '8px' }, onClick: function() { setShowSettings(false); } }, '\u2715')
            ),
            h(SettingsView, { lastSync: lastSync, onRefresh: loadData })
          )
        )
      );
    }

    // ── Mount ────────────────────────────────────────────────────────────
    ReactDOM.createRoot(document.getElementById('root')).render(h(App));
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>
</html>
